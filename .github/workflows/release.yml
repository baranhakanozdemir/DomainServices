name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: pack-and-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify csproj version matches tag
        run: |
          csproj_version=$(grep -oPm1 "(?<=<Version>)[^<]+" DomainServices.Core/DomainServices.Core.csproj)
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$csproj_version" != "$tag_version" ]; then
            echo "::error::csproj <Version> ($csproj_version) does not match tag ($tag_version). Bump the csproj before tagging."
            exit 1
          fi

      - name: Restore
        run: dotnet restore DomainServices.Core/DomainServices.Core.csproj

      - name: Build
        run: dotnet build DomainServices.Core/DomainServices.Core.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test DomainServices.Core/DomainServices.Core.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack DomainServices.Core/DomainServices.Core.csproj --configuration Release --no-build --output artifacts

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push 'artifacts/*.nupkg' \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate

      - name: Attach packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/*.nupkg artifacts/*.snupkg --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg artifacts/*.snupkg \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
