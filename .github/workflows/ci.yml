name: CI

on:
  push:
    branches: [main, Dev-C]
  pull_request:
    branches: [main, Dev-C]

permissions:
  contents: read

jobs:
  build:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DomainServices.slnx

      - name: Build
        run: dotnet build DomainServices.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DomainServices.slnx --configuration Release --no-build --verbosity normal
